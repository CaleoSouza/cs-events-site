<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <title>CS Events</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

  <style>
    /* ─── Variáveis ──────────────────────────────────────────── */
    :root {
      --bg:          #111827;
      --card:        #ffffff;
      --accent:      #3b82f6;
      --text-dark:   #111827;
      --text-mid:    #4b5563;
      --text-muted:  #9ca3af;
      --border:      #e5e7eb;
      --red:         #ef4444;
    }

    /* ─── Base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: #f9fafb;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: #0d1117;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1.25rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }
    .logo-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.45rem;
      border-radius: 5px;
    }
    .logo-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: #f9fafb;
    }
    .btn-reload {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      background: transparent;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-reload:hover { border-color: var(--accent); color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin .8s linear infinite; display: inline-block; }

    /* ─── Layout ─────────────────────────────────────────────── */
    .page-body {
      max-width: 540px;
      margin: 0 auto;
      padding: 1rem 0.875rem 2.5rem;
    }

    /* ─── Card section ───────────────────────────────────────── */
    .card-section {
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    .card-head {
      padding: 1rem 1.25rem 0.625rem;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-dark);
    }
    .card-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    /* ─── Calendário ─────────────────────────────────────────── */
    .cal-wrap { padding: 1rem 1.25rem 1.25rem; }
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .cal-nav-btn {
      background: none;
      border: none;
      color: var(--text-mid);
      font-size: 1rem;
      line-height: 1;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
      border-radius: 6px;
      transition: background .15s;
    }
    .cal-nav-btn:hover { background: #f3f4f6; }
    .cal-month-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-dark);
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .cal-dow {
      text-align: center;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-muted);
      padding-bottom: 0.4rem;
    }
    .cal-dow-sun { color: var(--red); }
    .cal-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.15rem 0 0.3rem;
    }
    .cal-num {
      width: 27px;
      height: 27px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.77rem;
      border-radius: 50%;
      color: var(--text-dark);
    }
    .cal-cell.other .cal-num  { color: #d1d5db; }
    .cal-cell.sun   .cal-num  { color: var(--red); }
    .cal-cell.today .cal-num  { background: var(--accent); color: #fff; font-weight: 700; }
    .cal-cell.today.sun .cal-num { color: #fff; }
    .cal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 1px;
    }

    /* ─── Linha de evento ────────────────────────────────────── */
    .ev-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #f3f4f6;
    }
    .ev-row:last-child { border-bottom: none; }
    .ev-thumb {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .ev-body { flex: 1; min-width: 0; }
    .ev-date  { font-size: 0.68rem; color: var(--text-muted); margin-bottom: 0.05rem; }
    .ev-title { font-size: 0.875rem; font-weight: 600; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ev-desc  { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ─── Estados ────────────────────────────────────────────── */
    .state-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.625rem;
      padding: 1.75rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .state-empty {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.82rem;
    }
    .state-error {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: #fca5a5;
      line-height: 1.6;
    }

    /* ─── Rodapé ─────────────────────────────────────────────── */
    .page-footer {
      text-align: center;
      font-size: 0.68rem;
      color: var(--text-muted);
      padding-top: 0.25rem;
    }
  </style>
</head>

<body>

<!-- ══════════════════════ HEADER ══════════════════════ -->
<header class="app-header">
  <a class="logo" href="#">
    <span class="logo-badge">CS</span>
    <span class="logo-name">Events</span>
  </a>
  <button class="btn-reload" onclick="carregar()">
    <i class="bi bi-arrow-clockwise" id="ico-reload"></i>
    Atualizar
  </button>
</header>

<!-- ══════════════════════ CONTEÚDO ══════════════════════ -->
<main class="page-body">

  <!-- Calendário -->
  <div class="card-section">
    <div id="cal-container">
      <div class="state-loading">
        <div class="spinner-border spinner-border-sm text-primary"></div>
        <span>Carregando calendário...</span>
      </div>
    </div>
  </div>

  <!-- Próximos Eventos -->
  <div class="card-section">
    <div class="card-head">
      <p class="card-title">Eventos Próximos</p>
      <p class="card-sub" id="sub-proximos">Carregando...</p>
    </div>
    <div id="lista-proximos">
      <div class="state-loading">
        <div class="spinner-border spinner-border-sm text-primary"></div>
      </div>
    </div>
  </div>

  <!-- Adicionados Recentemente -->
  <div class="card-section">
    <div class="card-head">
      <p class="card-title">Adicionados Recentemente</p>
      <p class="card-sub">Últimos eventos registrados</p>
    </div>
    <div id="lista-recentes">
      <div class="state-loading">
        <div class="spinner-border spinner-border-sm text-primary"></div>
      </div>
    </div>
  </div>

  <div class="page-footer" id="rodape">Conectando ao GitHub...</div>

</main>

<!-- ══════════════════════ SCRIPTS ══════════════════════ -->
<script>

/* ─────────────────────────────────────────────────────────
   CONFIGURAÇÃO — repositório público de dados
───────────────────────────────────────────────────────── */
const JSON_URL = 'https://raw.githubusercontent.com/CaleoSouza/cs-events-data/main/eventos.json';

/* ─────────────────────────────────────────────────────────
   UTILITÁRIOS
───────────────────────────────────────────────────────── */
const MESES_PT = [
  'Janeiro','Fevereiro','Março','Abril','Maio','Junho',
  'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'
];

const EMOJI_CAT = {
  '15 anos':     '🎂',
  'aniversário': '🎉',
  'business':    '💼',
  'casamento':   '💍',
  'chá de bebê': '👶',
  'família':     '👨‍👩‍👧',
  'feminina':    '💄',
  'formatura':   '🎓',
  'gestante':    '🤰',
  'infantil':    '🎈',
  'pré wedding': '💒',
};

function getEmoji(titulo, categoria) {
  const s = ((categoria || '') + ' ' + (titulo || '')).toLowerCase();
  for (const [chave, icone] of Object.entries(EMOJI_CAT)) {
    if (s.includes(chave)) return icone;
  }
  return '📷';
}

function fmtDia(str) {
  if (!str) return '';
  const [y, m, d] = str.substring(0, 10).split('-');
  return `${d}/${m}`;
}

function parseData(str) {
  if (!str) return null;
  // Formato: 'YYYY-MM-DD HH:MM' → converte espaço para T
  return new Date(str.substring(0, 16).replace(' ', 'T'));
}

/* ─────────────────────────────────────────────────────────
   ESTADO GLOBAL
───────────────────────────────────────────────────────── */
let _eventos = [];
let _calMes  = new Date().getMonth();
let _calAno  = new Date().getFullYear();

/* ─────────────────────────────────────────────────────────
   CALENDÁRIO
───────────────────────────────────────────────────────── */
function renderCal() {
  // Dias que têm evento no mês/ano exibido
  const diasComEv = new Set();
  for (const ev of _eventos) {
    const d = parseData(ev.data_inicio);
    if (d && d.getFullYear() === _calAno && d.getMonth() === _calMes) {
      diasComEv.add(d.getDate());
    }
  }

  const hoje     = new Date();
  const totalDias = new Date(_calAno, _calMes + 1, 0).getDate();
  const dow1      = new Date(_calAno, _calMes, 1).getDay(); // 0=Dom
  const diasPrev  = new Date(_calAno, _calMes, 0).getDate();

  // Semana começa na Segunda: offset = (dow1 + 6) % 7
  const offset = (dow1 + 6) % 7;

  let cells = '';

  // Células do mês anterior (preenchimento)
  for (let i = offset; i > 0; i--) {
    cells += `<div class="cal-cell other"><span class="cal-num">${diasPrev - i + 1}</span></div>`;
  }

  // Dias do mês atual
  for (let d = 1; d <= totalDias; d++) {
    const dow    = new Date(_calAno, _calMes, d).getDay();
    const ehHoje = d === hoje.getDate() && _calMes === hoje.getMonth() && _calAno === hoje.getFullYear();
    const ehDom  = dow === 0;
    const temEv  = diasComEv.has(d);

    let cls = 'cal-cell';
    if (ehHoje) cls += ' today';
    if (ehDom)  cls += ' sun';

    cells += `<div class="${cls}">
      <span class="cal-num">${d}</span>
      ${temEv ? '<div class="cal-dot"></div>' : ''}
    </div>`;
  }

  // Células do próximo mês (complemento da última linha)
  const total  = offset + totalDias;
  const filler = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= filler; i++) {
    cells += `<div class="cal-cell other"><span class="cal-num">${i}</span></div>`;
  }

  document.getElementById('cal-container').innerHTML = `
    <div class="cal-wrap">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="navMes(-1)"><i class="bi bi-chevron-left"></i></button>
        <span class="cal-month-label">${MESES_PT[_calMes]} ${_calAno}</span>
        <button class="cal-nav-btn" onclick="navMes(1)"><i class="bi bi-chevron-right"></i></button>
      </div>
      <div class="cal-grid">
        <div class="cal-dow">S</div>
        <div class="cal-dow">T</div>
        <div class="cal-dow">Q</div>
        <div class="cal-dow">Q</div>
        <div class="cal-dow">S</div>
        <div class="cal-dow">S</div>
        <div class="cal-dow cal-dow-sun">D</div>
        ${cells}
      </div>
    </div>`;
}

function navMes(delta) {
  _calMes += delta;
  if (_calMes > 11) { _calMes = 0; _calAno++; }
  if (_calMes < 0)  { _calMes = 11; _calAno--; }
  renderCal();
}

/* ─────────────────────────────────────────────────────────
   LISTAS DE EVENTOS
───────────────────────────────────────────────────────── */
function htmlLinha(ev) {
  return `
    <div class="ev-row">
      <div class="ev-thumb">${getEmoji(ev.titulo, ev.categoria)}</div>
      <div class="ev-body">
        <div class="ev-date">${fmtDia(ev.data_inicio)}</div>
        <div class="ev-title">${ev.titulo || '(sem título)'}</div>
        ${ev.descricao ? `<div class="ev-desc">${ev.descricao}</div>` : ''}
      </div>
    </div>`;
}

function renderProximos() {
  const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
  const prox = _eventos
    .filter(e => { const d = parseData(e.data_inicio); return d && d >= hoje; })
    .sort((a, b) => parseData(a.data_inicio) - parseData(b.data_inicio));

  const n = prox.length;
  document.getElementById('sub-proximos').textContent =
    n ? `${n} evento${n !== 1 ? 's' : ''} agendado${n !== 1 ? 's' : ''}` : 'Nenhum evento agendado';

  document.getElementById('lista-proximos').innerHTML =
    n ? prox.slice(0, 20).map(htmlLinha).join('')
      : '<div class="state-empty">Nenhum evento próximo</div>';
}

function renderRecentes() {
  const rec = [..._eventos]
    .sort((a, b) => (b.criado_em || '').localeCompare(a.criado_em || ''))
    .slice(0, 8);

  document.getElementById('lista-recentes').innerHTML =
    rec.length ? rec.map(htmlLinha).join('')
               : '<div class="state-empty">Nenhum evento encontrado</div>';
}

/* ─────────────────────────────────────────────────────────
   CARREGAMENTO DO JSON via GitHub raw
───────────────────────────────────────────────────────── */
async function carregar() {
  const ico = document.getElementById('ico-reload');
  ico.classList.add('spinning');
  document.getElementById('rodape').textContent = 'Buscando dados do GitHub...';

  try {
    // 1. Baixar eventos.json do repositório público de dados
    const resp = await fetch(`${JSON_URL}?_=${Date.now()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} — verifique se o repositório é público`);

    const payload = await resp.json();
    _eventos = Array.isArray(payload.eventos) ? payload.eventos : [];

    // 2. Renderizar tudo
    renderCal();
    renderProximos();
    renderRecentes();

    const agora = new Date();
    const n = _eventos.length;
    document.getElementById('rodape').textContent =
      `Atualizado às ${agora.toLocaleTimeString('pt-BR')} · ${n} evento${n !== 1 ? 's' : ''}`;

  } catch (err) {
    console.error(err);
    const msg = err.message || 'Erro desconhecido';
    const errHtml = `<div class="state-error">
      <i class="bi bi-exclamation-circle" style="font-size:1.5rem"></i><br>
      Erro ao carregar dados<br>
      <small style="opacity:.7">${msg}</small>
    </div>`;

    document.getElementById('cal-container').innerHTML   = errHtml;
    document.getElementById('lista-proximos').innerHTML  = errHtml;
    document.getElementById('lista-recentes').innerHTML  = errHtml;
    document.getElementById('rodape').textContent = `Falha ao conectar — ${msg}`;

  } finally {
    ico.classList.remove('spinning');
  }
}

/* ─────────────────────────────────────────────────────────
   INICIALIZAÇÃO
───────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', carregar);

</script>
</body>
</html>
