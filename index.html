<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <title>CS Events</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

  <style>
    /* ─── Variáveis ──────────────────────────────────────────── */
    :root {
      --bg:          #111827;
      --card:        #ffffff;
      --accent:      #3b82f6;
      --text-dark:   #111827;
      --text-mid:    #4b5563;
      --text-muted:  #9ca3af;
      --border:      #e5e7eb;
      --red:         #ef4444;
    }

    /* ─── Base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: #f9fafb;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: #0d1117;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1.25rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }
    .logo-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.45rem;
      border-radius: 5px;
    }
    .logo-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: #f9fafb;
    }
    .btn-reload {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      background: transparent;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-reload:hover { border-color: var(--accent); color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin .8s linear infinite; display: inline-block; }

    /* ─── Layout ─────────────────────────────────────────────── */
    .page-body {
      max-width: 540px;
      margin: 0 auto;
      padding: 1rem 0.875rem 2.5rem;
    }

    /* ─── Card section ───────────────────────────────────────── */
    .card-section {
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    .card-head {
      padding: 1rem 1.25rem 0.625rem;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-dark);
    }
    .card-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    /* ─── Calendário ─────────────────────────────────────────── */
    .cal-wrap { padding: 1rem 1.25rem 1.25rem; }
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .cal-nav-btn {
      background: none;
      border: none;
      color: var(--text-mid);
      font-size: 1rem;
      line-height: 1;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
      border-radius: 6px;
      transition: background .15s;
    }
    .cal-nav-btn:hover { background: #f3f4f6; }
    .cal-month-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-dark);
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .cal-dow {
      text-align: center;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-muted);
      padding-bottom: 0.4rem;
    }
    .cal-dow-sun { color: var(--red); }
    .cal-dow-sab { color: var(--text-dark); font-weight: 700; }
    .cal-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.15rem 0 0.3rem;
    }
    .cal-num {
      width: 27px;
      height: 27px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.77rem;
      border-radius: 50%;
      color: var(--text-dark);
    }
    .cal-cell.other .cal-num  { color: #d1d5db; }
    .cal-cell.sun   .cal-num  { color: var(--red); }
    .cal-cell.sab   .cal-num  { color: var(--text-dark); font-weight: 700; }
    .cal-cell.today .cal-num  { background: var(--accent); color: #fff; font-weight: 700; }
    .cal-cell.today.sun .cal-num { color: #fff; }
    
    /* Pontos em cores por categoria */
    .cal-dots-container {
      display: flex;
      gap: 3px;
      margin-top: 2px;
      justify-content: center;
      height: 5px;
    }
    .cal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }
    .cal-dot-particular {
      background: #22c55e;  /* Verde */
    }
    .cal-dot-atendimento {
      background: #ff9800;  /* Laranja */
    }
    .cal-dot-reuniao {
      background: #9c27b0;  /* Roxo */
    }
    .cal-dot-evento {
      background: #3b82f6;  /* Azul */
    }
    .cal-dot-feriado {
      background: #ef4444;  /* Vermelho */
    }

    .cal-cell.has-feriado { cursor: pointer; }
    .cal-cell.has-feriado:hover .cal-num { text-decoration: underline; }

    /* ─── Dia clicável ───────────────────────────────────────── */
    .cal-cell.has-ev { cursor: pointer; border-radius: 8px; transition: background .15s; }
    .cal-cell.has-ev:hover { background: rgba(59,130,246,.12); }
    .cal-cell.has-ev .cal-num { font-weight: 600; }

    /* ─── Bottom sheet (detalhes do dia) ─────────────────────── */
    .dia-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 999;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeInOv .18s ease;
    }
    @keyframes fadeInOv { from { opacity:0; } to { opacity:1; } }
    .dia-sheet {
      background: #1c2333;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 540px;
      max-height: 68vh;
      overflow-y: auto;
      animation: slideUp .22s ease;
    }
    @keyframes slideUp { from { transform:translateY(50px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    .dia-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid #30363d;
    }
    .dia-header-title { font-size:.95rem; font-weight:700; color:#f9fafb; }
    .dia-header-close {
      background: none; border: none; color:#9ca3af;
      font-size:1.1rem; cursor:pointer;
      padding:.2rem .4rem; border-radius:6px; line-height:1;
    }
    .dia-header-close:hover { background:#30363d; }
    .dia-ev-row {
      display: flex; align-items: center; gap:.75rem;
      padding:.75rem 1.25rem;
      border-bottom: 1px solid #252d3d;
    }
    .dia-ev-row:last-child { border-bottom: none; }
    .dia-ev-thumb {
      width:46px; height:46px; border-radius:10px;
      background:#252d3d;
      display:flex; align-items:center; justify-content:center;
      font-size:1.4rem; flex-shrink:0;
    }
    .dia-ev-body { flex:1; min-width:0; }
    .dia-ev-cat   { font-size:.65rem; color:var(--accent); text-transform:uppercase; letter-spacing:.04em; margin-bottom:.05rem; }
    .dia-ev-title { font-size:.875rem; font-weight:600; color:#f9fafb; }
    .dia-ev-desc  { font-size:.72rem; color:#9ca3af; margin-top:.1rem; }
    .dia-ev-local { font-size:.7rem;  color:#6b7280; margin-top:.15rem; }

    /* ─── Linha de evento ────────────────────────────────────── */
    .ev-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      transition: background .15s;
    }
    .ev-row:hover { background: rgba(59,130,246,.07); }
    .ev-row:last-child { border-bottom: none; }
    .ev-thumb {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .ev-body { flex: 1; min-width: 0; }
    .ev-date  { font-size: 0.68rem; color: var(--text-muted); margin-bottom: 0.05rem; }
    .ev-title { font-size: 0.875rem; font-weight: 600; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ev-desc  { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ─── Estados ────────────────────────────────────────────── */
    .state-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.625rem;
      padding: 1.75rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .state-empty {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.82rem;
    }
    .state-error {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: #fca5a5;
      line-height: 1.6;
    }

    /* ─── Rodapé ─────────────────────────────────────────────── */
    .page-footer {
      text-align: center;
      font-size: 0.68rem;
      color: var(--text-muted);
      padding-top: 0.25rem;
    }
  </style>
</head>

<body>

<!-- ══════════════════════ HEADER ══════════════════════ -->
<header class="app-header">
  <a class="logo" href="#">
    <span class="logo-badge">CS</span>
    <span class="logo-name">Events</span>
  </a>
  <div style="display:flex; gap:8px;">
    <button class="btn-reload" onclick="carregar()">
      <i class="bi bi-arrow-clockwise" id="ico-reload"></i>
      Atualizar
    </button>
  </div>
</header>

<!-- ══════════════════════ CONTEÚDO ══════════════════════ -->
<main class="page-body">

  <!-- Calendário -->
  <div class="card-section">
    <div id="cal-container">
      <div class="state-loading">
        <div class="spinner-border spinner-border-sm text-primary"></div>
        <span>Carregando calendário...</span>
      </div>
    </div>

  <!-- Eventos do Mês -->
  <div class="card-section">
    <div class="card-head">
      <p class="card-title" id="titulo-mes-eventos">Eventos de Junho</p>

        <div class="spinner-border spinner-border-sm text-primary"></div>

  <!-- Adicionados Recentemente -->
  <div class="card-section">
    <div class="card-head">
      <p class="card-title">Adicionados Recentemente</p>
      <p class="card-sub">Últimos eventos registrados</p>
    </div>
    <div id="lista-recentes">
      <div class="state-loading">
        <div class="spinner-border spinner-border-sm text-primary"></div>

  </div>

</main>

<!-- ══════════════════════ BOTTOM SHEET ══════════════════════ -->
<div id="overlay-dia" style="display:none" class="dia-overlay" onclick="fecharDia()">
  <div class="dia-sheet" onclick="event.stopPropagation()">
    <div class="dia-header">
      <span class="dia-header-title" id="dia-titulo-txt"></span>
      <button class="dia-header-close" onclick="fecharDia()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div id="dia-corpo"></div>
  </div>
</div>

<!-- ══════════════════════ MODAL DETALHE EVENTO ══════════════════════ -->
<div id="overlay-ev-det" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:998; align-items:flex-end; justify-content:center;" onclick="fecharEvDet()">
  <div style="background:#1c2333; border-radius:20px 20px 0 0; width:100%; max-width:540px; padding:1.25rem 1.5rem 2rem; animation:slideUp .22s ease;" onclick="event.stopPropagation()">

    <!-- Cabeçalho -->
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
      <span style="font-size:.85rem; font-weight:700; color:#9ca3af; text-transform:uppercase; letter-spacing:.05em;">Detalhes do Evento</span>
      <button onclick="fecharEvDet()" style="background:none; border:none; color:#9ca3af; font-size:1.1rem; cursor:pointer; padding:.2rem .4rem; border-radius:6px; line-height:1;"><i class="bi bi-x-lg"></i></button>
    </div>

    <!-- Emoji + título + categoria -->
    <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.25rem;">
      <div id="ev-det-emoji" style="font-size:2.2rem; width:56px; height:56px; background:#252d3d; border-radius:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0;"></div>
      <div>
        <div id="ev-det-titulo" style="font-size:1.1rem; font-weight:700; color:#f9fafb; line-height:1.3;"></div>
        <div id="ev-det-cat" style="font-size:.72rem; color:var(--accent); text-transform:uppercase; letter-spacing:.04em; margin-top:.2rem;"></div>
      </div>
    </div>

    <!-- Data/hora -->
    <div style="display:flex; align-items:center; gap:.6rem; margin-bottom:.75rem;">
      <i class="bi bi-calendar3" style="color:#6b7280; font-size:.95rem;"></i>
      <span id="ev-det-data" style="font-size:.9rem; color:#d1d5db;"></span>
    </div>

    <!-- Local -->
    <div id="ev-det-local-row" style="display:flex; align-items:center; gap:.6rem; margin-bottom:.75rem;">
      <i class="bi bi-geo-alt" style="color:#6b7280; font-size:.95rem;"></i>
      <span id="ev-det-local" style="font-size:.9rem; color:#d1d5db;"></span>
    </div>

    <!-- Descrição -->
    <div id="ev-det-desc-row" style="margin-top:.5rem;">
      <div style="font-size:.75rem; color:#6b7280; margin-bottom:.3rem; text-transform:uppercase; letter-spacing:.04em;">Descrição</div>
      <div id="ev-det-desc" style="font-size:.88rem; color:#9ca3af; line-height:1.55;"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════ SCRIPTS ══════════════════════ -->
<script>

/* ─────────────────────────────────────────────────────────
   CONFIGURAÇÃO — repositório público de dados
───────────────────────────────────────────────────────── */
// Raw URL — sem rate limit (repositório público)
const JSON_API_URL = 'https://raw.githubusercontent.com/CaleoSouza/cs-events-data/main/eventos.json';

/* ─────────────────────────────────────────────────────────
   UTILITÁRIOS
───────────────────────────────────────────────────────── */
const MESES_PT = [
  'Janeiro','Fevereiro','Março','Abril','Maio','Junho',
  'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'
];

const EMOJI_CAT = {
  '15 anos':       '🎂',
  'sessão 15 anos': '🎂',
  'aniversário':    '🎉',
  'batizado':      '🙏',
  'bodas':         '💑',
  'business':      '💼',
  'casamento':     '💍',
  'chá de bebê':   '👶',
  'cobertura':     '📹',
  'família':        '👨‍👩‍👧',
  'feminina':      '💄',
  'formatura':     '🎓',
  'gestante':      '🤰',
  'infantil':      '🎈',
  'mini':          '📸',
  'pré wedding':   '💒',
};

function getEmoji(titulo, categoria) {
  const s = ((categoria || '') + ' ' + (titulo || '')).toLowerCase();
  for (const [chave, icone] of Object.entries(EMOJI_CAT)) {
    if (s.includes(chave)) return icone;
  }
  return '📷';
}

function fmtDia(str) {
  if (!str) return '';
  const [y, m, d] = str.substring(0, 10).split('-');
  return `${d}/${m}`;
}

function parseData(str) {
  if (!str) return null;
  // Formato: 'YYYY-MM-DD HH:MM' → converte espaço para T
  return new Date(str.substring(0, 16).replace(' ', 'T'));
}

/* ─────────────────────────────────────────────────────────
   ESTADO GLOBAL
───────────────────────────────────────────────────────── */
let _eventos = [];
let _calMes  = new Date().getMonth();
let _calAno  = new Date().getFullYear();

/* ─────────────────────────────────────────────────────────
   FERIADOS NACIONAIS BRASILEIROS
───────────────────────────────────────────────────────── */
function calcularPascoa(ano) {
  const a = ano % 19, b = Math.floor(ano / 100), c = ano % 100;
  const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const mes = Math.floor((h + l - 7 * m + 114) / 31) - 1; // 0-based
  const dia = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(ano, mes, dia);
}

function feriadosBrasileiros(ano) {
  const p = calcularPascoa(ano);
  const add = (d, dias) => { const r = new Date(d); r.setDate(r.getDate() + dias); return r; };
  const chave = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const f = {};
  f[chave(new Date(ano, 0, 1))]  = 'Confraternização Universal';
  f[chave(add(p, -48))]          = 'Segunda de Carnaval';
  f[chave(add(p, -47))]          = 'Terça de Carnaval';
  f[chave(add(p, -2))]           = 'Sexta-Feira Santa';
  f[chave(p)]                    = 'Páscoa';
  f[chave(new Date(ano, 3, 21))] = 'Tiradentes';
  f[chave(new Date(ano, 4, 1))]  = 'Dia do Trabalho';
  f[chave(add(p, 60))]           = 'Corpus Christi';
  f[chave(new Date(ano, 8, 7))]  = 'Independência do Brasil';
  f[chave(new Date(ano, 9, 12))] = 'Nossa Senhora Aparecida';
  f[chave(new Date(ano, 10, 2))] = 'Finados';
  f[chave(new Date(ano, 10, 15))]= 'Proclamação da República';
  f[chave(new Date(ano, 10, 20))]= 'Consciência Negra';
  f[chave(new Date(ano, 11, 25))]= 'Natal';
  return f;
}

/* ─────────────────────────────────────────────────────────
   CALENDÁRIO
───────────────────────────────────────────────────────── */
function renderCal() {
  // Mapear eventos por dia
  const eventosPorDia = {};
  for (const ev of _eventos) {
    const d = parseData(ev.data_inicio);
    if (d && d.getFullYear() === _calAno && d.getMonth() === _calMes) {
      const dia = d.getDate();
      if (!eventosPorDia[dia]) eventosPorDia[dia] = [];
      eventosPorDia[dia].push(ev);
    }
  }

  // Feriados do mês exibido
  const feriados = feriadosBrasileiros(_calAno);

  const hoje      = new Date();
  const totalDias = new Date(_calAno, _calMes + 1, 0).getDate();
  const dow1      = new Date(_calAno, _calMes, 1).getDay(); // 0=Dom
  const diasPrev  = new Date(_calAno, _calMes, 0).getDate();

  // Semana começa no Domingo: offset = dow1
  const offset = dow1;

  let cells = '';

  // Células do mês anterior (preenchimento)
  for (let i = offset; i > 0; i--) {
    cells += `<div class="cal-cell other"><span class="cal-num">${diasPrev - i + 1}</span></div>`;
  }

  // Dias do mês atual
  for (let d = 1; d <= totalDias; d++) {
    const dow    = new Date(_calAno, _calMes, d).getDay();
    const ehHoje = d === hoje.getDate() && _calMes === hoje.getMonth() && _calAno === hoje.getFullYear();
    const ehDom  = dow === 0;
    const ehSab  = dow === 6;
    const temEv  = eventosPorDia[d] && eventosPorDia[d].length > 0;
    const chave  = `${_calAno}-${String(_calMes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const nomeFeriado = feriados[chave];
    const temFeriado  = !!nomeFeriado;

    let cls = 'cal-cell';
    if (ehHoje)     cls += ' today';
    if (ehDom)      cls += ' sun';
    if (ehSab)      cls += ' sab';
    if (temEv)      cls += ' has-ev';
    if (temFeriado && !temEv) cls += ' has-feriado';

    const clickEv      = temEv      ? `onclick="verDia(${d})"` : '';
    const clickFeriado = temFeriado && !temEv ? `onclick="verFeriado('${nomeFeriado}', '${String(d).padStart(2,'0')}/${String(_calMes+1).padStart(2,'0')}/${_calAno}')"` : '';

    // Construir container de pontos por categoria
    let dotsHtml = '';
    if (temEv) {
      const evsDia = eventosPorDia[d];
      const temParticular = evsDia.some(e => e.categoria?.toLowerCase() === 'particular');
      const temAtendimento = evsDia.some(e => e.categoria?.toLowerCase() === 'atendimento');
      const temReuniao = evsDia.some(e => e.categoria?.toLowerCase() === 'reunião');
      const temOutro = evsDia.some(e => !['particular', 'atendimento', 'reunião'].includes(e.categoria?.toLowerCase() || ''));
      
      dotsHtml = '<div class="cal-dots-container">';
      if (temParticular)  dotsHtml += '<div class="cal-dot cal-dot-particular"></div>';
      if (temAtendimento) dotsHtml += '<div class="cal-dot cal-dot-atendimento"></div>';
      if (temReuniao)     dotsHtml += '<div class="cal-dot cal-dot-reuniao"></div>';
      if (temOutro)       dotsHtml += '<div class="cal-dot cal-dot-evento"></div>';
      dotsHtml += '</div>';
    } else if (temFeriado) {
      dotsHtml = '<div class="cal-dots-container"><div class="cal-dot cal-dot-feriado"></div></div>';
    }

    cells += `<div class="${cls}" ${clickEv || clickFeriado}>
      <span class="cal-num">${d}</span>
      ${dotsHtml}
    </div>`;
  }

  // Células do próximo mês (complemento da última linha)
  const total  = offset + totalDias;
  const filler = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= filler; i++) {
    cells += `<div class="cal-cell other"><span class="cal-num">${i}</span></div>`;
  }

  document.getElementById('cal-container').innerHTML = `
    <div class="cal-wrap">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="navMes(-1)"><i class="bi bi-chevron-left"></i></button>
        <span class="cal-month-label">${MESES_PT[_calMes]} ${_calAno}</span>
        <button class="cal-nav-btn" onclick="navMes(1)"><i class="bi bi-chevron-right"></i></button>
      </div>
      <div class="cal-grid">
        <div class="cal-dow cal-dow-sun">D</div>
        <div class="cal-dow">S</div>
        <div class="cal-dow">T</div>
        <div class="cal-dow">Q</div>
        <div class="cal-dow">Q</div>
        <div class="cal-dow">S</div>
        <div class="cal-dow cal-dow-sab">S</div>
        ${cells}
      </div>
    </div>`;
}

/* ─────────────────────────────────────────────────────────
   EXIBIR DETALHE DE FERIADO
───────────────────────────────────────────────────────── */
function verFeriado(nome, data) {
  alert(`🗓️  ${data}\n\n${nome}`);
}

function navMes(delta) {
  _calMes += delta;
  if (_calMes > 11) { _calMes = 0; _calAno++; }
  if (_calMes < 0)  { _calMes = 11; _calAno--; }
  renderCal();
  renderEventosMes();
}

/* ─────────────────────────────────────────────────────────
   LISTAS DE EVENTOS
───────────────────────────────────────────────────────── */
function htmlLinha(ev, idx) {
  return `
    <div class="ev-row" onclick="verEvento(${idx})">
      <div class="ev-thumb">${getEmoji(ev.titulo, ev.categoria)}</div>
      <div class="ev-body">
        <div class="ev-date">${fmtDia(ev.data_inicio)}</div>
        <div class="ev-title">${ev.titulo || '(sem título)'}</div>
        ${ev.descricao ? `<div class="ev-desc">${ev.descricao}</div>` : ''}
      </div>
      <i class="bi bi-chevron-right" style="color:#9ca3af; font-size:.8rem; flex-shrink:0;"></i>
    </div>`;
}

function renderEventosMes() {
  const eventosMes = _eventos
    .filter(e => {
      const d = parseData(e.data_inicio);
      return d && d.getFullYear() === _calAno && d.getMonth() === _calMes;
    })
    .sort((a, b) => parseData(a.data_inicio) - parseData(b.data_inicio));

  const n = eventosMes.length;
  document.getElementById('titulo-mes-eventos').textContent = `Eventos de ${MESES_PT[_calMes]}`;
  document.getElementById('sub-mes-eventos').textContent = n
    ? `${n} evento${n !== 1 ? 's' : ''} em ${MESES_PT[_calMes]}`
    : `Nenhum evento em ${MESES_PT[_calMes]}`;

  document.getElementById('lista-mes-eventos').innerHTML =
    n ? eventosMes.map((ev, i) => htmlLinha(ev, _eventos.indexOf(ev))).join('')
      : `<div class="state-empty">Nenhum evento em ${MESES_PT[_calMes]}</div>`;
}

function renderRecentes() {
  const rec = [..._eventos]
    .sort((a, b) => (b.criado_em || '').localeCompare(a.criado_em || ''))
    .slice(0, 5);

  document.getElementById('lista-recentes').innerHTML =
    rec.length ? rec.map(ev => htmlLinha(ev, _eventos.indexOf(ev))).join('')
               : '<div class="state-empty">Nenhum evento encontrado</div>';
}

/* ─────────────────────────────────────────────────────────
   MODAL — detalhe de evento individual
───────────────────────────────────────────────────────── */
function verEvento(idx) {
  const ev = _eventos[idx];
  if (!ev) return;

  const d    = parseData(ev.data_inicio);
  const data = d ? `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}` : '';
  const hora = ev.data_inicio && ev.data_inicio.length > 10
    ? ev.data_inicio.substring(11, 16) : '';
  const dataHora = hora ? `${data} às ${hora}` : data;

  document.getElementById('ev-det-emoji').textContent  = getEmoji(ev.titulo, ev.categoria);
  document.getElementById('ev-det-titulo').textContent = ev.titulo || '(sem título)';
  document.getElementById('ev-det-cat').textContent    = ev.categoria || '';
  document.getElementById('ev-det-data').textContent   = dataHora;
  document.getElementById('ev-det-local').textContent  = ev.local || '';
  document.getElementById('ev-det-local-row').style.display = ev.local ? 'flex' : 'none';
  document.getElementById('ev-det-desc').textContent   = ev.descricao || '';
  document.getElementById('ev-det-desc-row').style.display = ev.descricao ? 'block' : 'none';

  document.getElementById('overlay-ev-det').style.display = 'flex';
}

function fecharEvDet() {
  document.getElementById('overlay-ev-det').style.display = 'none';
}

/* ─────────────────────────────────────────────────────────
   BOTTOM SHEET — detalhes do dia
───────────────────────────────────────────────────────── */
function verDia(dia) {
  const evsDia = _eventos
    .filter(e => {
      const d = parseData(e.data_inicio);
      return d && d.getFullYear() === _calAno && d.getMonth() === _calMes && d.getDate() === dia;
    })
    .sort((a, b) => parseData(a.data_inicio) - parseData(b.data_inicio));

  const diaStr = String(dia).padStart(2, '0');
  document.getElementById('dia-titulo-txt').textContent =
    `${diaStr} de ${MESES_PT[_calMes]} ${_calAno}`;

  document.getElementById('dia-corpo').innerHTML = evsDia.map(e => `
    <div class="dia-ev-row">
      <div class="dia-ev-thumb">${getEmoji(e.titulo, e.categoria)}</div>
      <div class="dia-ev-body">
        ${e.categoria ? `<div class="dia-ev-cat">${e.categoria}</div>` : ''}
        <div class="dia-ev-title">${e.titulo || '(sem título)'}</div>
        ${e.descricao ? `<div class="dia-ev-desc">${e.descricao}</div>` : ''}
        ${e.local     ? `<div class="dia-ev-local"><i class="bi bi-geo-alt"></i> ${e.local}</div>` : ''}
      </div>
    </div>`).join('');

  document.getElementById('overlay-dia').style.display = 'flex';
}

function fecharDia() {
  document.getElementById('overlay-dia').style.display = 'none';
}

/* ─────────────────────────────────────────────────────────
   CARREGAMENTO DO JSON via GitHub raw
───────────────────────────────────────────────────────── */
async function carregar() {
  const ico = document.getElementById('ico-reload');
  ico.classList.add('spinning');
  document.getElementById('rodape').textContent = 'Buscando dados do GitHub...';

  try {
    // 1. Baixar eventos.json diretamente (sem rate limit)
    const resp = await fetch(JSON_API_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status} — verifique se o repositório é público`);

    const payload = await resp.json();
    _eventos = Array.isArray(payload.eventos) ? payload.eventos : [];

    // 2. Renderizar tudo
    renderCal();
    renderEventosMes();
    renderRecentes();

    const agora = new Date();
    const n = _eventos.length;
    document.getElementById('rodape').textContent =
      `Atualizado às ${agora.toLocaleTimeString('pt-BR')} · ${n} evento${n !== 1 ? 's' : ''}`;

  } catch (err) {
    console.error(err);
    const msg = err.message || 'Erro desconhecido';
    const errHtml = `<div class="state-error">
      <i class="bi bi-exclamation-circle" style="font-size:1.5rem"></i><br>
      Erro ao carregar dados<br>
      <small style="opacity:.7">${msg}</small>
    </div>`;

    document.getElementById('cal-container').innerHTML   = errHtml;
    document.getElementById('lista-proximos').innerHTML  = errHtml;
    document.getElementById('lista-recentes').innerHTML  = errHtml;
    document.getElementById('rodape').textContent = `Falha ao conectar — ${msg}`;

  } finally {
    ico.classList.remove('spinning');
  }
}

/* ─────────────────────────────────────────────────────────
   INICIALIZAÇÃO
───────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', carregar);

</script>
